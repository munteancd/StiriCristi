name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:
  schedule:
    # Run daily at 10:00 AM Romania time (UTC+2 in winter, UTC+3 in summer)
    # Using UTC 8:00 AM (which is 10:00 AM Romania time in winter)
    - cron: '0 8 * * *'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Set up environment
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> $GITHUB_ENV
          echo "OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}" >> $GITHUB_ENV
          
      - name: Generate bulletin
        run: |
          python -m generator.main
          
      - name: Copy audio to pwa directory
        run: |
          mkdir -p pwa/public
          cp public/latest.mp3 pwa/public/
          cp public/latest.json pwa/public/
          
      - name: Copy PWA files to root for GitHub Pages
        run: |
          cp -r pwa/* .
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
