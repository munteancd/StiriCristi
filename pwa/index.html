<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a1a">
  <title>Știri Cristi</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-default">
  <main class="app">
    <div class="controls-top">
      <button id="speed-btn" class="speed-btn" type="button" aria-label="Viteză redare">1×</button>
    </div>

    <h1 class="app__title">Știri Cristi</h1>
    <p class="app__date" id="bulletin-date">Se încarcă…</p>
    <p class="resume-hint" id="resume-hint" aria-live="polite" hidden></p>

    <button
      id="play-btn"
      class="play-btn"
      aria-label="Redare"
      type="button"
    >
      <span class="play-btn__icon" id="play-btn-icon" aria-hidden="true">▶</span>
    </button>

    <div class="progress" aria-hidden="true">
      <div class="progress__bar" id="progress-bar"></div>
    </div>

    <p class="time">
      <span id="time-current">0:00</span>
      <span class="time__sep">/</span>
      <span id="time-total">0:00</span>
    </p>

    <nav class="chapters" id="chapters" aria-label="Capitole buletin" hidden></nav>

    <div class="seek-buttons">
      <button class="seek-btn" id="seek-back" type="button" aria-label="Înapoi 30 secunde">⏪ 30</button>
      <button class="seek-btn" id="seek-fwd" type="button" aria-label="Înainte 30 secunde">30 ⏩</button>
    </div>

    <p class="status" id="status" role="status" aria-live="polite"></p>

    <div class="headlines-container" id="headlines-container">
      <h2 class="headlines-title">În ediția de azi:</h2>
      <ul class="headlines-list" id="headlines-list">
        <!-- populated by app.js -->
      </ul>
    </div>
  </main>

  <audio id="audio" preload="auto"></audio>
  <script src="app.js"></script>
</body>
</html>
